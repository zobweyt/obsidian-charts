name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bump version in manifest.json
        id: bump
        run: |
          CURRENT_VERSION=$(jq -r '.version' manifest.json)
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
          if [ "${{ inputs.version_type }}" == "major" ]; then
            major=$((major + 1)); minor=0; patch=0
          elif [ "${{ inputs.version_type }}" == "minor" ]; then
            minor=$((minor + 1)); patch=0
          else
            patch=$((patch + 1))
          fi
          NEW_VERSION="$major.$minor.$patch"
          echo "$(jq --arg ver "$NEW_VERSION" '.version = $ver' manifest.json)" > manifest.json
          echo "new_version_value=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit changes and push tag
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/signing_key
          chmod 600 ~/.ssh/signing_key

          git config --global user.name "Nikita Gaziev"
          git config --global user.email "zobweyt@gmail.com"

          git config --global gpg.format ssh
          git config --global user.signingkey ~/.ssh/signing_key
          git config --global commit.gpgsign true
          git config --global tag.gpgsign true

          git add manifest.json
          git commit -m "Release ${{ steps.bump.outputs.new_version_value }}" --no-verify
          git tag "${{ steps.bump.outputs.new_version_value }}" -m "Release ${{ steps.bump.outputs.new_version_value }}"

          git push origin HEAD:${{ github.ref_name }} --tags

      - name: Setup deno
        uses: denoland/setup-deno@v2
        with:
          cache: true
          deno-version: latest

      - name: Build plugin
        run: deno task build

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/main.js
            dist/manifest.json
            dist/styles.css

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh release create "${{ steps.bump.outputs.new_version_value }}" \
            --title "${{ steps.bump.outputs.new_version_value }}" \
            --generate-notes \
            dist/main.js dist/manifest.json dist/styles.css
